name: build audit-worker

on:
  push:
    branches: [main]
    paths:
      - 'audit-worker/**'
      - '.github/workflows/audit-worker.yml'
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./audit-worker
          file: ./audit-worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/audit-worker:latest
            ghcr.io/${{ github.repository_owner }}/audit-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
